<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px;
            text-align: left;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .row:last-child { margin-bottom: 0; }
        .label { color: #666; font-size: 14px; }
        .value { font-weight: bold; font-size: 14px; }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            margin: 20px -30px;
            position: relative;
        }
        .summary {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            padding: 10px 0 30px 0;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4682b4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .btn {
            background-color: #3e7085;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="details">
        <div class="row">
            <span class="label">Package Price</span>
            <span class="value">6.99 USD</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <div class="row">
            <span class="label">Description</span>
            <span class="value">For unlimited use</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="summary">
        <span>Total Summary</span>
        <span>6.99 USD</span>
    </div>

    <div class="loader"></div>

    <p class="status-text">
        Processing payment verification... This may take a few minutes.
    </p>

    <button class="btn">Verifying...</button>
</div>

</body>
</html>
